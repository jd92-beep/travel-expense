[build]
command = "VITE_BASE_PATH=/ npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"
VITE_BASE_PATH = "/"
VITE_COMPACT_AUTH_REDIRECT_URL = "https://travel-expense-react.vercel.app/?compact_oauth=1"
VITE_COMPACT_PUBLIC_URL = "https://travel-expense-compact.netlify.app/"

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
