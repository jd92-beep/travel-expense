[build]
command = "VITE_BASE_PATH=/ npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"
VITE_BASE_PATH = "/"
VITE_COMPACT_PUBLIC_URL = "https://travel-expense-compact.netlify.app/"

[[headers]]
for = "/*"
  [headers.values]
  Content-Security-Policy = "script-src 'self' 'wasm-unsafe-eval'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self)"

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
