name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install React app deps
        working-directory: app
        run: npm install --no-audit --no-fund

      - name: Build React app
        working-directory: app
        run: npm run build

      - name: Prepare _site (legacy at root, React preview at /react/)
        run: |
          mkdir -p _site/react
          # Legacy working app stays at root — all OCR / email / Notion / vault features live.
          cp index.html _site/index.html
          # React UI preview (functional backend still being ported from legacy).
          cp -r app/dist/* _site/react/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
