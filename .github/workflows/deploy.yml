name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install React app deps
        working-directory: app
        run: npm install --no-audit --no-fund

      - name: Build React app
        working-directory: app
        run: npm run build

      - name: Install v3 app deps
        working-directory: app3
        run: npm install --no-audit --no-fund

      - name: Build v3 app
        working-directory: app3
        run: npm run build

      - name: Prepare _site (legacy at root, React at /react/, v3 at /v3/)
        env:
          MINIMAX_KEY: ${{ secrets.MINIMAX_KEY }}
          ZAI_KEY: ${{ secrets.ZAI_KEY }}
        run: |
          mkdir -p _site/react _site/v3
          # Legacy working app — inject API keys from GitHub repository secrets.
          # Source has __MINIMAX_KEY__ / __ZAI_KEY__ placeholders;
          # sed replaces them here so live keys never appear in git history.
          # Do NOT inject Kimi here: the Pages HTML is public. Kimi keys must
          # come from local secrets.local.js or the Settings UI on the device.
          # If a secret is unset the placeholder stays (app falls back to Settings input).
          sed \
            -e "s|__MINIMAX_KEY__|${MINIMAX_KEY}|g" \
            -e "s|__ZAI_KEY__|${ZAI_KEY}|g" \
            index.html > _site/index.html
          # React UI (dark theme redesign)
          cp -r app/dist/* _site/react/
          # v3: legacy design + React + Framer Motion animations
          cp -r app3/dist/* _site/v3/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
