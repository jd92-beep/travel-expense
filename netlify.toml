[build]
base = "app-react"
command = "VITE_BASE_PATH=/ npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"
VITE_BASE_PATH = "/"

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
  [headers.values]
  Cache-Control = "no-cache"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
